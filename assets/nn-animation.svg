<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 230" width="800" height="230">
  <style>
    .node { fill: #1e293b; stroke-width: 2; }
    .conn { fill: none; stroke: #334155; stroke-width: 1.2; }
    .label { fill: #64748b; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
    .phase { font-family: sans-serif; font-size: 10px; text-anchor: middle; letter-spacing: 1px; }

    /* Phase labels */
    @keyframes showForward {
      0%, 3% { opacity: 0; }
      6%, 38% { opacity: 1; }
      42%, 100% { opacity: 0; }
    }
    @keyframes showBackprop {
      0%, 50% { opacity: 0; }
      54%, 86% { opacity: 1; }
      90%, 100% { opacity: 0; }
    }
    .phase-fwd { fill: #38bdf8; animation: showForward 8s ease-in-out infinite; opacity: 0; }
    .phase-bp { fill: #f97316; animation: showBackprop 8s ease-in-out infinite; opacity: 0; }

    /* Node glow: forward (blue) then backprop (orange) */
    @keyframes glow0 {
      0%, 4% { stroke: #475569; filter: none; }
      6%, 14% { stroke: #38bdf8; filter: url(#glow-blue); }
      16%, 74% { stroke: #475569; filter: none; }
      76%, 84% { stroke: #f97316; filter: url(#glow-orange); }
      86%, 100% { stroke: #475569; filter: none; }
    }
    @keyframes glow1 {
      0%, 12% { stroke: #475569; filter: none; }
      14%, 22% { stroke: #38bdf8; filter: url(#glow-blue); }
      24%, 66% { stroke: #475569; filter: none; }
      68%, 76% { stroke: #f97316; filter: url(#glow-orange); }
      78%, 100% { stroke: #475569; filter: none; }
    }
    @keyframes glow2 {
      0%, 20% { stroke: #475569; filter: none; }
      22%, 30% { stroke: #38bdf8; filter: url(#glow-blue); }
      32%, 58% { stroke: #475569; filter: none; }
      60%, 68% { stroke: #f97316; filter: url(#glow-orange); }
      70%, 100% { stroke: #475569; filter: none; }
    }
    @keyframes glow3 {
      0%, 28% { stroke: #475569; filter: none; }
      30%, 38% { stroke: #38bdf8; filter: url(#glow-blue); }
      40%, 50% { stroke: #475569; filter: none; }
      52%, 60% { stroke: #f97316; filter: url(#glow-orange); }
      62%, 100% { stroke: #475569; filter: none; }
    }

    .l0 { animation: glow0 8s ease-in-out infinite; }
    .l1 { animation: glow1 8s ease-in-out infinite; }
    .l2 { animation: glow2 8s ease-in-out infinite; }
    .l3 { animation: glow3 8s ease-in-out infinite; }

    /* Connection pulses: forward (blue) then backprop (orange) */
    @keyframes pulse01 {
      0%, 6% { stroke: #334155; stroke-width: 1.2; }
      8%, 16% { stroke: #38bdf8; stroke-width: 1.8; }
      18%, 68% { stroke: #334155; stroke-width: 1.2; }
      70%, 78% { stroke: #f97316; stroke-width: 1.8; }
      80%, 100% { stroke: #334155; stroke-width: 1.2; }
    }
    @keyframes pulse12 {
      0%, 14% { stroke: #334155; stroke-width: 1.2; }
      16%, 24% { stroke: #38bdf8; stroke-width: 1.8; }
      26%, 60% { stroke: #334155; stroke-width: 1.2; }
      62%, 70% { stroke: #f97316; stroke-width: 1.8; }
      72%, 100% { stroke: #334155; stroke-width: 1.2; }
    }
    @keyframes pulse23 {
      0%, 22% { stroke: #334155; stroke-width: 1.2; }
      24%, 32% { stroke: #38bdf8; stroke-width: 1.8; }
      34%, 52% { stroke: #334155; stroke-width: 1.2; }
      54%, 62% { stroke: #f97316; stroke-width: 1.8; }
      64%, 100% { stroke: #334155; stroke-width: 1.2; }
    }

    .c01 { animation: pulse01 8s ease-in-out infinite; }
    .c12 { animation: pulse12 8s ease-in-out infinite; }
    .c23 { animation: pulse23 8s ease-in-out infinite; }
  </style>

  <defs>
    <filter id="glow-blue">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Connections: Input -> Hidden1 -->
  <line class="conn c01" x1="120" y1="50" x2="300" y2="35"/>
  <line class="conn c01" x1="120" y1="50" x2="300" y2="80"/>
  <line class="conn c01" x1="120" y1="50" x2="300" y2="130"/>
  <line class="conn c01" x1="120" y1="50" x2="300" y2="175"/>
  <line class="conn c01" x1="120" y1="110" x2="300" y2="35"/>
  <line class="conn c01" x1="120" y1="110" x2="300" y2="80"/>
  <line class="conn c01" x1="120" y1="110" x2="300" y2="130"/>
  <line class="conn c01" x1="120" y1="110" x2="300" y2="175"/>
  <line class="conn c01" x1="120" y1="170" x2="300" y2="35"/>
  <line class="conn c01" x1="120" y1="170" x2="300" y2="80"/>
  <line class="conn c01" x1="120" y1="170" x2="300" y2="130"/>
  <line class="conn c01" x1="120" y1="170" x2="300" y2="175"/>

  <!-- Connections: Hidden1 -> Hidden2 -->
  <line class="conn c12" x1="300" y1="35" x2="480" y2="35"/>
  <line class="conn c12" x1="300" y1="35" x2="480" y2="80"/>
  <line class="conn c12" x1="300" y1="35" x2="480" y2="130"/>
  <line class="conn c12" x1="300" y1="35" x2="480" y2="175"/>
  <line class="conn c12" x1="300" y1="80" x2="480" y2="35"/>
  <line class="conn c12" x1="300" y1="80" x2="480" y2="80"/>
  <line class="conn c12" x1="300" y1="80" x2="480" y2="130"/>
  <line class="conn c12" x1="300" y1="80" x2="480" y2="175"/>
  <line class="conn c12" x1="300" y1="130" x2="480" y2="35"/>
  <line class="conn c12" x1="300" y1="130" x2="480" y2="80"/>
  <line class="conn c12" x1="300" y1="130" x2="480" y2="130"/>
  <line class="conn c12" x1="300" y1="130" x2="480" y2="175"/>
  <line class="conn c12" x1="300" y1="175" x2="480" y2="35"/>
  <line class="conn c12" x1="300" y1="175" x2="480" y2="80"/>
  <line class="conn c12" x1="300" y1="175" x2="480" y2="130"/>
  <line class="conn c12" x1="300" y1="175" x2="480" y2="175"/>

  <!-- Connections: Hidden2 -> Output -->
  <line class="conn c23" x1="480" y1="35" x2="660" y2="80"/>
  <line class="conn c23" x1="480" y1="35" x2="660" y2="140"/>
  <line class="conn c23" x1="480" y1="80" x2="660" y2="80"/>
  <line class="conn c23" x1="480" y1="80" x2="660" y2="140"/>
  <line class="conn c23" x1="480" y1="130" x2="660" y2="80"/>
  <line class="conn c23" x1="480" y1="130" x2="660" y2="140"/>
  <line class="conn c23" x1="480" y1="175" x2="660" y2="80"/>
  <line class="conn c23" x1="480" y1="175" x2="660" y2="140"/>

  <!-- Nodes: Input layer -->
  <circle class="node l0" cx="120" cy="50" r="12"/>
  <circle class="node l0" cx="120" cy="110" r="12"/>
  <circle class="node l0" cx="120" cy="170" r="12"/>

  <!-- Nodes: Hidden layer 1 -->
  <circle class="node l1" cx="300" cy="35" r="12"/>
  <circle class="node l1" cx="300" cy="80" r="12"/>
  <circle class="node l1" cx="300" cy="130" r="12"/>
  <circle class="node l1" cx="300" cy="175" r="12"/>

  <!-- Nodes: Hidden layer 2 -->
  <circle class="node l2" cx="480" cy="35" r="12"/>
  <circle class="node l2" cx="480" cy="80" r="12"/>
  <circle class="node l2" cx="480" cy="130" r="12"/>
  <circle class="node l2" cx="480" cy="175" r="12"/>

  <!-- Nodes: Output layer -->
  <circle class="node l3" cx="660" cy="80" r="12"/>
  <circle class="node l3" cx="660" cy="140" r="12"/>

  <!-- Layer labels -->
  <text class="label" x="120" y="210">Input</text>
  <text class="label" x="300" y="210">Hidden 1</text>
  <text class="label" x="480" y="210">Hidden 2</text>
  <text class="label" x="660" y="210">Output</text>

  <!-- Phase labels -->
  <text class="phase phase-fwd" x="390" y="225">FORWARD PASS &#x2192;</text>
  <text class="phase phase-bp" x="390" y="225">&#x2190; BACKPROPAGATION</text>
</svg>
